name: Build All Xposed Module APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - ShizukuSceneFix
          - GameUnlockerPro_Root
          - GameUnlockerPro_NoRoot
          - MicroXEnhancer
          - PrivacyGuard_NoRoot
          - PrivacyGuard_Root
          - AdBlockerX_NoRoot
          - AdBlockerX_Root
          - BatteryOptimizer_NoRoot
          - BatteryOptimizer_Root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        working-directory: modules/${{ matrix.module }}
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Build Release APK
        working-directory: modules/${{ matrix.module }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-apk
          path: modules/${{ matrix.module }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

  collect:
    name: Collect All APKs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-apks
          merge-multiple: false

      - name: Flatten APKs
        run: |
          mkdir -p flattened
          find all-apks -name "*.apk" | while read f; do
            mod=$(echo "$f" | cut -d'/' -f2 | sed 's/-apk//')
            cp "$f" "flattened/${mod}.apk"
          done
          ls -la flattened/

      - name: Upload all APKs
        uses: actions/upload-artifact@v4
        with:
          name: all-xposed-apks
          path: flattened/*.apk
          retention-days: 30
